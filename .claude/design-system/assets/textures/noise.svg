<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="4" stitchTiles="stitch" result="noise"></feTurbulence>
      <feColorMatrix type="saturate" values="0" in="noise" result="monoNoise"></feColorMatrix>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#noise)" fill="black" opacity="0.2"></rect>
</svg>