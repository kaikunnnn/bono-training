<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:0;font-family:var(--font-sans)}
.hero{width:100%;height:170px;background:linear-gradient(180deg,#E0E5F8 0%,#FAF4F0 36.7%,#F9F9F7 100%);display:flex;align-items:center;justify-content:center;position:relative}
.hero h1{font:700 26px var(--font-rounded);color:#1d382f;margin:0;text-align:center}
.hero p{font:500 13px var(--font-sans);color:#475569;margin:6px 0 0}
.hero .stack{display:flex;flex-direction:column;align-items:center}
.arc{position:absolute;bottom:-1px;left:0;right:0;height:24px;background:#F9F9F7;border-radius:50% 50% 0 0 / 100% 100% 0 0;transform:translateY(12px)}
</style></head><body>
<div class="hero">
  <div class="stack">
    <h1>トレーニング。それは"可能性"をひらく扉。</h1>
    <p>各コースで身につけたことをアウトプットするお題を並べています🙋</p>
  </div>
  <div class="arc"></div>
</div>
</body></html>
