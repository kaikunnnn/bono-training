<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{width:110px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font:800 12px var(--font-rounded)}
.lbl{font:500 11px var(--font-sans);color:var(--text-secondary)}
.hex{font:500 10px var(--font-mono);color:var(--text-muted)}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:var(--bg-success);color:var(--text-success)">Success</div><div class="lbl">success</div><div class="hex">#047A53</div></div>
<div class="sw"><div class="chip" style="background:var(--bg-warning);color:var(--text-warning)">Warning</div><div class="lbl">warning</div><div class="hex">#9E6608</div></div>
<div class="sw"><div class="chip" style="background:var(--bg-error);color:var(--text-error)">Error</div><div class="lbl">error</div><div class="hex">#C42626</div></div>
<div class="sw"><div class="chip" style="background:#fff;color:var(--text-link);border:1px solid #eee">Link</div><div class="lbl">link</div><div class="hex">#0829BF</div></div>
<div class="sw"><div class="chip" style="background:#F0FDF4;color:#16A34A">+success</div><div class="lbl">success scale</div><div class="hex">#22C55E</div></div>
</div>
</body></html>
