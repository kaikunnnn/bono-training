<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{width:96px;height:64px;border-radius:12px;border:1px solid rgba(0,0,0,.06)}
.lbl{font:500 11px/1.3 var(--font-sans);color:var(--text-secondary)}
.hex{font:500 10px/1.3 var(--font-mono);color:var(--text-muted);letter-spacing:.02em}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#F9F9F7"></div><div class="lbl">bg / base</div><div class="hex">#F9F9F7</div></div>
<div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="lbl">surface</div><div class="hex">#FFFFFF</div></div>
<div class="sw"><div class="chip" style="background:#F5EFE7"></div><div class="lbl">warm</div><div class="hex">#F5EFE7</div></div>
<div class="sw"><div class="chip" style="background:#F2F3F0"></div><div class="lbl">muted</div><div class="hex">#F2F3F0</div></div>
<div class="sw"><div class="chip" style="background:#E9EAE6"></div><div class="lbl">muted-strong</div><div class="hex">#E9EAE6</div></div>
<div class="sw"><div class="chip" style="background:#021710"></div><div class="lbl">text primary</div><div class="hex">#021710</div></div>
<div class="sw"><div class="chip" style="background:#354540"></div><div class="lbl">text secondary</div><div class="hex">#354540</div></div>
<div class="sw"><div class="chip" style="background:#677470"></div><div class="lbl">text muted</div><div class="hex">#677470</div></div>
<div class="sw"><div class="chip" style="background:#9AA29F"></div><div class="lbl">text disabled</div><div class="hex">#9AA29F</div></div>
</div>
</body></html>
