<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:20px;font-family:var(--font-sans);display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
.goal{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:200px;width:160px;height:100px;gap:4px}
.goal img{width:32px;height:32px;object-fit:contain}
.goal span{font:800 13px var(--font-rounded);color:#021710}
.av{display:flex;flex-direction:column;align-items:center;gap:4px}
.av img{width:52px;height:52px;border-radius:9999px;background:#fff;padding:2px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.lbl{font:500 10px var(--font-mono);color:var(--text-muted)}
</style></head><body>
<div class="goal"><img src="../assets/goal-buttons/flying_saucer_3d.png"><span>転職する</span></div>

<div class="goal"><img src="../assets/goal-buttons/magic_wand_3d.png"><span>スキルアップ</span></div>
<div class="av"><img src="../assets/avatars/avatar-01.svg"><div class="lbl">avatar</div></div>
<div class="av"><img src="../assets/avatars/avatar-03.svg"><div class="lbl">avatar</div></div>
<div class="av"><img src="../assets/avatars/avatar-05.svg"><div class="lbl">avatar</div></div>
</body></html>
