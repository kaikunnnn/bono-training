<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{width:110px;height:70px;border-radius:14px;border:1px solid rgba(0,0,0,.06);display:flex;align-items:flex-end;padding:8px;color:#fff;font:700 11px var(--font-rounded)}
.lbl{font:500 11px/1.3 var(--font-sans);color:var(--text-secondary)}
.hex{font:500 10px/1.3 var(--font-mono);color:var(--text-muted)}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#102720">CTA</div><div class="lbl">cta primary</div><div class="hex">#102720</div></div>
<div class="sw"><div class="chip" style="background:#1A3A30">CTA hover</div><div class="lbl">cta hover</div><div class="hex">#1A3A30</div></div>
<div class="sw"><div class="chip" style="background:#0D221D">footer</div><div class="lbl">training-dark</div><div class="hex">#0D221D</div></div>
<div class="sw"><div class="chip" style="background:#FF9900">●</div><div class="lbl">training orange</div><div class="hex">#FF9900</div></div>
<div class="sw"><div class="chip" style="background:#F95A16">●</div><div class="lbl">accent orange</div><div class="hex">#F95A16</div></div>
<div class="sw"><div class="chip" style="background:#77850E">●</div><div class="lbl">label olive</div><div class="hex">#77850E</div></div>
<div class="sw"><div class="chip" style="background:#FFF9F4;color:#0D221D">Bg</div><div class="lbl">training bg</div><div class="hex">#FFF9F4</div></div>
</div>
</body></html>
