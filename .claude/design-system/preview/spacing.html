<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

.lbl{font:500 10px var(--font-mono);color:var(--text-muted);margin-top:4px;text-align:center}
.s{display:flex;flex-direction:column;align-items:center}
</style></head><body>

<div class="s"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>

<div class="s"><div class="bar" style="height:20px"></div><div class="lbl">20</div></div>
<div class="s"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
<div class="s"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
<div class="s"><div class="bar" style="height:40px"></div><div class="lbl">40</div></div>
<div class="s"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
<div class="s"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>

</div>
</body></html>
