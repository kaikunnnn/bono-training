<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:18px;font-family:var(--font-sans);display:flex;gap:14px;flex-wrap:wrap}
.card{background:#fff;border-radius:24px;padding:18px;width:280px;box-shadow:1px 1px 14px 0 rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04)}
.thumb{height:110px;border-radius:16px;background:linear-gradient(135deg,#304750,#5D5B65);margin-bottom:12px}
.cat{font:700 12px var(--font-rounded);color:#08381D}
.title{font:700 18px/1.4 var(--font-rounded);color:#020617;margin:4px 0 6px}
.desc{font:400 13px/1.6 var(--font-sans);color:#354540;margin:0 0 10px}
.meta{display:flex;gap:6px;font:500 10px var(--font-mono);color:#677470}
.tag{background:#F1F5F9;padding:2px 6px;border-radius:6px;color:#1D283D}
.quest{background:#fff;border-radius:20px;padding:16px;width:280px;box-shadow:1px 1px 4px 0 rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06)}
.q-num{font:700 11px var(--font-mono);color:#414141}
.q-title{font:700 15px/1.5 var(--font-rounded);color:#151834;margin:4px 0}
.q-dur{font:500 11px var(--font-sans);color:#8C8C8C}
</style></head><body>
<div class="card">
  <div class="thumb"></div>
  <div class="cat">UIビジュアル</div>
  <div class="title">UIデザインのきほん</div>
  <div class="desc">ユーザー起点で課題解決をするロードマップ</div>
  <div class="meta"><span class="tag">筋トレ部位</span><span>UIビジュアル</span></div>
</div>
<div class="quest">
  <div class="q-num">LESSON 01</div>
  <div class="q-title">ゼロからはじめる情報設計</div>
  <div class="q-dur">12分 · 進捗 45%</div>
</div>
</body></html>
