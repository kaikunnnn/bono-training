<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{width:150px;height:90px;border-radius:18px;border:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font:800 13px var(--font-rounded);letter-spacing:.02em}
.chip .t{text-shadow:0 1px 2px rgba(0,0,0,.3)}
.lbl{font:500 11px var(--font-sans);color:var(--text-secondary)}
.hex{font:500 10px var(--font-mono);color:var(--text-muted);letter-spacing:-.01em}
</style></head><body>
<div class="row">
<div class="sw">
  <div class="chip" style="background:linear-gradient(0deg,rgba(0,0,0,.12),rgba(0,0,0,.12)),linear-gradient(0deg,#482B4B 0%,#2A2C42 27%,#141520 100%)"><span class="t">UIUX転職</span></div>
  <div class="lbl">career-change</div><div class="hex">#482B4B · #2A2C42 · #141520</div>
</div>
<div class="sw">
  <div class="chip" style="background:linear-gradient(0deg,rgba(0,0,0,.12),rgba(0,0,0,.12)),linear-gradient(0deg,#684B4B 0%,#231C26 100%)"><span class="t">UIデザイン入門</span></div>
  <div class="lbl">ui-beginner</div><div class="hex">#684B4B → #231C26</div>
</div>
<div class="sw">
  <div class="chip" style="background:linear-gradient(0deg,rgba(0,0,0,.32),rgba(0,0,0,.32)),linear-gradient(0deg,#304750 0%,#5D5B65 100%)"><span class="t">UIビジュアル</span></div>
  <div class="lbl">ui-visual</div><div class="hex">#304750 → #5D5B65 +32% dim</div>
</div>
<div class="sw">
  <div class="chip" style="background:linear-gradient(0deg,rgba(0,0,0,.42),rgba(0,0,0,.42)),linear-gradient(0deg,#214234 0%,#8D7746 100%)"><span class="t">情報設計</span></div>
  <div class="lbl">info-arch</div><div class="hex">#214234 → #8D7746 +42% dim</div>
</div>
<div class="sw">
  <div class="chip" style="background:linear-gradient(0deg,rgba(0,0,0,.52),rgba(0,0,0,.52)),linear-gradient(0deg,#F1BAC1 0%,#E27979 12%,#764749 54%,#2F3F6D 100%)"><span class="t">UXデザイン</span></div>
  <div class="lbl">ux-design</div><div class="hex">#F1BAC1 · #E27979 · #764749 · #2F3F6D</div>
</div>
</div>
</body></html>
