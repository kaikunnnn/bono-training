<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:20px;flex-wrap:wrap}
.box{width:130px;height:80px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font:600 11px var(--font-sans);color:var(--text-secondary)}
.lbl{font:500 10px var(--font-mono);color:var(--text-muted);margin-top:6px}
.s{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="row">
<div class="s"><div class="box" style="box-shadow:0px 1px 3px 0px rgba(0,0,0,0.04)">xs</div><div class="lbl">shadow-xs</div></div>
<div class="s"><div class="box" style="box-shadow:0px 1px 12px 0px rgba(0,0,0,0.05)">sm</div><div class="lbl">shadow-sm</div></div>
<div class="s"><div class="box" style="box-shadow:1px 1px 14px 0px rgba(0,0,0,0.04)">card</div><div class="lbl">shadow-card</div></div>
<div class="s"><div class="box" style="box-shadow:0px 4px 20px rgba(0,0,0,0.08)">md</div><div class="lbl">shadow-md</div></div>
<div class="s"><div class="box" style="box-shadow:0px 8px 24px 0px rgba(0,0,0,0.16)">lift</div><div class="lbl">shadow-lift</div></div>
<div class="s"><div class="box" style="box-shadow:0px 4px 4px 0px rgba(0,0,0,0.25);background:#102720;color:#fff">cta</div><div class="lbl">shadow-cta</div></div>
</div>
</body></html>
