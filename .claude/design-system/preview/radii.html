<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.box{background:var(--bg-muted-strong);display:flex;align-items:center;justify-content:center;font:500 11px var(--font-mono);color:var(--text-secondary)}
.lbl{font:500 10px var(--font-mono);color:var(--text-muted);margin-top:4px;text-align:center}
.s{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="row">
<div class="s"><div class="box" style="width:56px;height:56px;border-radius:6px">xs</div><div class="lbl">6px</div></div>
<div class="s"><div class="box" style="width:56px;height:56px;border-radius:8px">sm</div><div class="lbl">8px</div></div>
<div class="s"><div class="box" style="width:56px;height:56px;border-radius:12px">md</div><div class="lbl">12px</div></div>
<div class="s"><div class="box" style="width:64px;height:64px;border-radius:16px">lg</div><div class="lbl">16px</div></div>
<div class="s"><div class="box" style="width:70px;height:70px;border-radius:24px">xl</div><div class="lbl">24px</div></div>
<div class="s"><div class="box" style="width:80px;height:80px;border-radius:32px">3xl</div><div class="lbl">32px card</div></div>
<div class="s"><div class="box" style="width:110px;height:44px;border-radius:200px">pill</div><div class="lbl">pill / 200px</div></div>
</div>
</body></html>
