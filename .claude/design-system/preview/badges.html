<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-sans);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid #0f172a;border-radius:9999px;font:700 12px var(--font-rounded);color:#0f172a;background:#fff}
.pill .n{font-weight:800;color:#0f172a}
.tag{display:inline-flex;align-items:center;padding:3px 8px;background:#F1F5F9;border-radius:6px;font:500 10px var(--font-rounded);color:#1D283D}
.type{display:inline-flex;padding:6px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:9999px;font:700 12px var(--font-rounded);color:#1D283D}
.cat{display:inline-flex;align-items:center;padding:4px 10px;border-radius:9999px;font:700 11px var(--font-rounded);color:#fff}
</style></head><body>
<span class="pill"><span class="n">NEW!</span> AIプロトタイピングコース</span>

<span class="cat" style="background:#F59E0B">BONO</span>
<span class="cat" style="background:#10B981">アウトプット</span>
<span class="cat" style="background:#8B5CF6">ブック</span>
<span class="cat" style="background:#1DA1F2">ツイート</span>
</body></html>
