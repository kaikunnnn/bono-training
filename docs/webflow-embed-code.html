<!--
  Webflow埋め込み用コード: 最新コンテンツ表示（手動指定版）

  使い方:
  1. ITEMS配列に表示したいコンテンツを指定（type + slug）
  2. このコード全体をWebflowのEmbedエレメントに貼り付け
-->

<!-- コンテナ -->
<div id="sanity-updates-container"></div>

<style>
  .sanity-updates {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  }

  .sanity-updates__title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0 0 16px 0;
  }

  /* リストコンテナ */
  .sanity-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* リストアイテム */
  .sanity-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.15s ease;
  }

  .sanity-item:hover {
    border-color: #d0d0d0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  /* サムネイル */
  .sanity-item__thumb {
    flex-shrink: 0;
    width: 72px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
    background: #f5f5f5;
  }

  .sanity-item__thumb--placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    font-size: 18px;
  }

  /* コンテンツ部分 */
  .sanity-item__content {
    flex: 1;
    min-width: 0;
  }

  /* バッジ + 日付の行 */
  .sanity-item__meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  /* タイプバッジ */
  .sanity-item__badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .sanity-item__badge--lesson {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .sanity-item__badge--article {
    background: #fce7f3;
    color: #be185d;
  }

  .sanity-item__badge--blogPost {
    background: #d1fae5;
    color: #047857;
  }

  /* 日付 */
  .sanity-item__date {
    font-size: 11px;
    color: #999;
  }

  /* タイトル */
  .sanity-item__title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.4;
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ローディング・エラー */
  .sanity-updates__loading,
  .sanity-updates__error {
    text-align: center;
    padding: 32px;
    color: #666;
    font-size: 14px;
  }

  .sanity-updates__error {
    color: #dc2626;
  }

  /* レスポンシブ */
  @media (max-width: 480px) {
    .sanity-item {
      padding: 10px;
      gap: 12px;
    }
    .sanity-item__thumb {
      width: 60px;
      height: 40px;
    }
    .sanity-item__title {
      font-size: 13px;
    }
  }
</style>

<script>
(function() {
  // ============================================
  // 設定
  // ============================================
  const CONFIG = {
    BASE_URL: 'https://bono-training.vercel.app',
    SANITY_PROJECT_ID: 'cqszh4up',
    SANITY_DATASET: 'production',
    SANITY_API_VERSION: '2024-01-01',
    SECTION_TITLE: '最新コンテンツ',
  };

  // ============================================
  // 表示するコンテンツ（手動指定）
  // type: 'lesson' | 'article' | 'blogPost'
  // slug: コンテンツのスラッグ
  // ============================================
  const ITEMS = [
    { type: 'lesson', slug: 'ui-design-flow-lv1' },
    { type: 'lesson', slug: 'failurepoint' },
    { type: 'lesson', slug: 'zerokara-userinterview' },
    { type: 'lesson', slug: 'bannerbeginner' },
    { type: 'lesson', slug: 'rookiesaction' },
    { type: 'lesson', slug: 'figma-elementary' },
  ];

  // ============================================
  // タイプ別設定
  // ============================================
  const TYPE_CONFIG = {
    lesson: {
      label: 'レッスン',
      badgeClass: 'sanity-item__badge--lesson',
      pathPrefix: '/lessons/',
      emoji: '📚',
    },
    article: {
      label: '記事',
      badgeClass: 'sanity-item__badge--article',
      pathPrefix: '/articles/',
      emoji: '📝',
    },
    blogPost: {
      label: 'ブログ',
      badgeClass: 'sanity-item__badge--blogPost',
      pathPrefix: '/blog/',
      emoji: '✏️',
    },
  };

  // ============================================
  // Sanity画像URL生成
  // ============================================
  function getSanityImageUrl(image, width = 200) {
    if (!image?.asset?._ref) return null;
    const ref = image.asset._ref;
    const match = ref.match(/^image-(\w+)-(\d+x\d+)-(\w+)$/);
    if (!match) return null;
    const [, id, dimensions, format] = match;
    return `https://cdn.sanity.io/images/${CONFIG.SANITY_PROJECT_ID}/${CONFIG.SANITY_DATASET}/${id}-${dimensions}.${format}?w=${width}&fit=crop&auto=format`;
  }

  // ============================================
  // データ取得
  // ============================================
  async function fetchItems() {
    // タイプ別にslugをグループ化
    const byType = {};
    ITEMS.forEach(item => {
      if (!byType[item.type]) byType[item.type] = [];
      byType[item.type].push(`"${item.slug}"`);
    });

    // 各タイプのクエリを結合
    const queries = Object.entries(byType).map(([type, slugs]) => {
      return `*[_type == "${type}" && slug.current in [${slugs.join(',')}]] {
        _id,
        _type,
        _updatedAt,
        title,
        "slug": slug.current,
        thumbnail,
        thumbnailUrl,
        ${type === 'lesson' ? 'iconImageUrl,' : ''}
        ${type === 'blogPost' ? 'emoji,' : ''}
      }`;
    });

    // 全クエリを配列として取得
    const fullQuery = `[${queries.join(',')}]`;
    const url = `https://${CONFIG.SANITY_PROJECT_ID}.api.sanity.io/v${CONFIG.SANITY_API_VERSION}/data/query/${CONFIG.SANITY_DATASET}?query=${encodeURIComponent(fullQuery)}`;

    const response = await fetch(url);
    if (!response.ok) throw new Error('データの取得に失敗しました');

    const data = await response.json();

    // 結果をフラット化してマップ化
    const allItems = data.result.flat();
    const itemMap = {};
    allItems.forEach(item => {
      itemMap[`${item._type}:${item.slug}`] = item;
    });

    // ITEMSの順序で並べ直す
    return ITEMS.map(item => itemMap[`${item.type}:${item.slug}`]).filter(Boolean);
  }

  // ============================================
  // 日付フォーマット
  // ============================================
  function formatDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

    if (diffDays === 0) return '今日';
    if (diffDays === 1) return '昨日';
    if (diffDays < 7) return `${diffDays}日前`;
    if (diffDays < 30) return `${Math.floor(diffDays / 7)}週間前`;

    return `${date.getMonth() + 1}/${date.getDate()}`;
  }

  // ============================================
  // アイテムHTML生成
  // ============================================
  function createItemHtml(item) {
    const typeConfig = TYPE_CONFIG[item._type] || TYPE_CONFIG.lesson;
    const thumbnailUrl = getSanityImageUrl(item.thumbnail) || item.thumbnailUrl || item.iconImageUrl;
    const link = `${CONFIG.BASE_URL}${typeConfig.pathPrefix}${item.slug}`;

    const thumbHtml = thumbnailUrl
      ? `<img class="sanity-item__thumb" src="${thumbnailUrl}" alt="" loading="lazy">`
      : `<div class="sanity-item__thumb sanity-item__thumb--placeholder">${typeConfig.emoji}</div>`;

    return `
      <a href="${link}" target="_blank" rel="noopener" class="sanity-item">
        ${thumbHtml}
        <div class="sanity-item__content">
          <div class="sanity-item__meta">
            <span class="sanity-item__badge ${typeConfig.badgeClass}">${typeConfig.label}</span>
            <span class="sanity-item__date">${formatDate(item._updatedAt)}</span>
          </div>
          <h3 class="sanity-item__title">${item.title}</h3>
        </div>
      </a>
    `;
  }

  // ============================================
  // 描画
  // ============================================
  async function render() {
    const container = document.getElementById('sanity-updates-container');
    if (!container) return;

    container.innerHTML = `
      <div class="sanity-updates">
        <div class="sanity-updates__loading">読み込み中...</div>
      </div>
    `;

    try {
      const items = await fetchItems();

      if (!items || items.length === 0) {
        container.innerHTML = `
          <div class="sanity-updates">
            <div class="sanity-updates__loading">コンテンツがありません</div>
          </div>
        `;
        return;
      }

      const itemsHtml = items.map(createItemHtml).join('');

      container.innerHTML = `
        <div class="sanity-updates">
          <h2 class="sanity-updates__title">${CONFIG.SECTION_TITLE}</h2>
          <div class="sanity-list">
            ${itemsHtml}
          </div>
        </div>
      `;
    } catch (error) {
      console.error('Sanity取得エラー:', error);
      container.innerHTML = `
        <div class="sanity-updates">
          <div class="sanity-updates__error">コンテンツの読み込みに失敗しました</div>
        </div>
      `;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
