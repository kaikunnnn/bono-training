<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #F9F9F7; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #F9F9F7; padding: 32px 12px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 640px; background-color: #FFFFFF; border-radius: 32px; overflow: hidden; border: 1px solid #F5F5F5; box-shadow: 0px 4px 8px 0px rgba(0, 0, 0, 0.04);">
          <!-- ヘッダー -->
          <tr>
            <td style="padding: 32px 48px 24px 48px; text-align: left;">
              <span style="font-size: 20px; font-weight: 700; color: #151834; letter-spacing: 2px;">BONO</span>
            </td>
          </tr>
          <!-- コンテンツ -->
          <tr>
            <td style="padding: 0 48px 32px 48px;">
              <h1 style="font-size: 24px; font-weight: 700; color: #021710; margin: 0 0 16px 0; line-height: 1.4;">
                パスワードの再設定
              </h1>
              <p style="font-size: 15px; color: #354540; line-height: 1.8; margin: 0 0 24px 0;">
                パスワードの再設定をリクエストしました。<br>
                下のボタンをクリックして新しいパスワードを設定してください。
              </p>
              <table cellpadding="0" cellspacing="0" style="margin: 0 0 24px 0;">
                <tr>
                  <td style="background-color: #102720; border-radius: 14px; padding: 14px 32px;">
                    <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery" style="color: #FFFFFF; text-decoration: none; font-size: 15px; font-weight: 700; display: inline-block;">
                      パスワードを再設定する
                    </a>
                  </td>
                </tr>
              </table>
              <p style="font-size: 13px; color: #677470; line-height: 1.6; margin: 0;">
                このメールに心当たりがない場合は、無視してください。<br>
                リンクの有効期限は24時間です。
              </p>
            </td>
          </tr>
          <!-- フッター -->
          <tr>
            <td style="padding: 24px 48px; border-top: 1px solid #F0F0F0; text-align: center;">
              <p style="font-size: 12px; color: #9AA29F; margin: 0;">
                © BONO — UIUXデザインを学ぶ
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
