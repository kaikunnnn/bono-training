<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif">
  <!-- 伝えたいこと：機能ではなくユーザーのゴールを起点にアイデアを出し、プロトタイプにして検証する -->
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2876DC"/>
      <stop offset="1" stop-color="#FF98DD"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Badルート：機能から考える（グレー・✕） -->
  <rect x="80" y="60" width="340" height="110" rx="16" fill="#F4F4F1" stroke="#C3C5BB" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="28" font-weight="bold" fill="#677470">“機能”から考える</text>
  <text x="250" y="146" text-anchor="middle" font-size="20" fill="#918C7E">例：グラフ機能を作る</text>
  <line x1="420" y1="115" x2="600" y2="115" stroke="#C3C5BB" stroke-width="8" stroke-dasharray="16 12"/>
  <polygon points="600,101 628,115 600,129" fill="#C3C5BB"/>
  <g stroke="#677470" stroke-width="10" stroke-linecap="round">
    <line x1="496" y1="91" x2="544" y2="139"/>
    <line x1="544" y1="91" x2="496" y2="139"/>
  </g>
  <text x="656" y="123" font-size="22" fill="#918C7E">発想が狭くなる</text>

  <!-- Goodバッジ -->
  <rect x="80" y="244" width="216" height="48" rx="24" fill="url(#flow)"/>
  <text x="188" y="276" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">ここから始める</text>

  <!-- ブロック1：ユーザーのゴール -->
  <rect x="80" y="330" width="300" height="260" rx="20" fill="#FFFFFF" stroke="#D4D6CC" stroke-width="2.5"/>
  <g stroke="#021710" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="205" cy="392" r="17"/>
    <path d="M 172 448 C 172 422 238 422 238 448"/>
    <line x1="262" y1="366" x2="262" y2="446"/>
  </g>
  <polygon points="262,366 302,378 262,390" fill="#FF98DD" stroke="#021710" stroke-width="4" stroke-linejoin="round"/>
  <text x="230" y="510" text-anchor="middle" font-size="30" font-weight="bold" fill="#021710">ユーザーのゴール</text>
  <text x="230" y="546" text-anchor="middle" font-size="19" fill="#677470">気になる出費に</text>
  <text x="230" y="572" text-anchor="middle" font-size="19" fill="#677470">自分で気づける状態</text>

  <!-- 矢印1 -->
  <line x1="392" y1="460" x2="446" y2="460" stroke="#4A7BDA" stroke-width="10" stroke-linecap="round"/>
  <polygon points="446,444 474,460 446,476" fill="#4A7BDA"/>

  <!-- ブロック2：アイデア -->
  <rect x="486" y="330" width="300" height="260" rx="20" fill="#FFFFFF" stroke="#D4D6CC" stroke-width="2.5"/>
  <g stroke="#021710" stroke-width="4.5" fill="none" stroke-linecap="round">
    <circle cx="586" cy="400" r="16"/>
    <line x1="578" y1="424" x2="594" y2="424"/>
    <circle cx="636" cy="384" r="20"/>
    <line x1="626" y1="412" x2="646" y2="412"/>
    <circle cx="688" cy="402" r="16"/>
    <line x1="680" y1="426" x2="696" y2="426"/>
  </g>
  <g stroke="#FF98DD" stroke-width="4" stroke-linecap="round">
    <line x1="636" y1="352" x2="636" y2="340"/>
    <line x1="610" y1="360" x2="602" y2="350"/>
    <line x1="662" y1="360" x2="670" y2="350"/>
  </g>
  <text x="636" y="510" text-anchor="middle" font-size="30" font-weight="bold" fill="#021710">アイデア</text>
  <text x="636" y="546" text-anchor="middle" font-size="19" fill="#677470">ゴールに向かう手段を</text>
  <text x="636" y="572" text-anchor="middle" font-size="19" fill="#677470">複数出す</text>

  <!-- 矢印2 -->
  <line x1="798" y1="460" x2="852" y2="460" stroke="#9487DB" stroke-width="10" stroke-linecap="round"/>
  <polygon points="852,444 880,460 852,476" fill="#9487DB"/>

  <!-- ブロック3：プロトタイプ -->
  <rect x="892" y="330" width="300" height="260" rx="20" fill="#FFFFFF" stroke="#D4D6CC" stroke-width="2.5"/>
  <g stroke="#021710" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1012" y="360" width="60" height="104" rx="12"/>
    <line x1="1030" y1="446" x2="1054" y2="446"/>
    <line x1="1024" y1="384" x2="1060" y2="384"/>
    <line x1="1024" y1="404" x2="1060" y2="404"/>
  </g>
  <text x="1042" y="510" text-anchor="middle" font-size="30" font-weight="bold" fill="#021710">プロトタイプ</text>
  <text x="1042" y="546" text-anchor="middle" font-size="19" fill="#677470">アイデアを</text>
  <text x="1042" y="572" text-anchor="middle" font-size="19" fill="#677470">触れる画面にする</text>

  <!-- 矢印3 -->
  <line x1="1204" y1="460" x2="1258" y2="460" stroke="#DE93DC" stroke-width="10" stroke-linecap="round"/>
  <polygon points="1258,444 1286,460 1258,476" fill="#DE93DC"/>

  <!-- ブロック4：検証・学び -->
  <rect x="1298" y="330" width="300" height="260" rx="20" fill="#FFFFFF" stroke="#D4D6CC" stroke-width="2.5"/>
  <g stroke="#021710" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="1438" cy="398" r="30"/>
    <line x1="1460" y1="420" x2="1482" y2="442"/>
    <path d="M 1424 398 L 1434 410 L 1454 386"/>
  </g>
  <text x="1448" y="510" text-anchor="middle" font-size="30" font-weight="bold" fill="#021710">検証・学び</text>
  <text x="1448" y="546" text-anchor="middle" font-size="19" fill="#677470">ユーザー視点で触って</text>
  <text x="1448" y="572" text-anchor="middle" font-size="19" fill="#677470">気づきを得る</text>

  <!-- ループ：学びを次のゴール仮説へ -->
  <path d="M 1448 590 C 1448 740 230 740 230 614" fill="none" stroke="#B08BDC" stroke-width="6" stroke-dasharray="16 12" stroke-linecap="round"/>
  <polygon points="214,618 230,590 246,618" fill="#B08BDC"/>
  <text x="800" y="782" text-anchor="middle" font-size="24" font-weight="bold" fill="#677470">触って得た学びを、次のゴール仮説へ</text>
</svg>
