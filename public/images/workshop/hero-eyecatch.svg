<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" preserveAspectRatio="xMidYMid slice">
  <!-- テスト用アイキャッチのプレースホルダー。差し替え時はこのファイルを置き換えるか config.ts の eyecatch を変更 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4EFE3"/>
      <stop offset="1" stop-color="#DCE5D4"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9DB894"/>
